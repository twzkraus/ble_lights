turn_on:
  name: Turn on
  description: >-
    Turns on one or more BLE Lights and adjusts their properties, even when they are turned on already.
  target:
    entity:
      domain: light
      integration: ble_lights
  fields:
    color_palette:
      name: Color Palette
      description: The color palette.
      example: Cherry Blossom
      selector:
        select:
          options:
            - 4th of July
            - Candy
            - Cherry Blossom
            - Christmas
            - Confetti
            - Diamonds
            - Easter
            - Fall Green
            - Fall Red
            - Five Color
            - Go Pack Go
            - Halloween
            - Hydrangea
            - Lindsay
            - Mardi Gras
            - Moonlight
            - Rainbow
            - Sapphire
            - St. Patrick's Day
            - Starry Night
            - Under the Sea
            - Valentine's Day
    effect:
      name: Effect
      description: The effect to run.
      example: Chase
      selector:
        select:
          options:
            - Still
            - Blink
            - Twinkle
            - Chase
            - Moving Wave
            - Ants
            - Sparkle
            - White Sparkle
            - Three Block
            - Trains
            - Cross Fade
            - Blocks
            - Block Gradient
            - Spiral
            - Shimmer
            - Glow Worm
            - Clouds
            - Color Pulse
            - Random Placement
            - Electric Shock
    brightness:
      name: Brightness
      description: Brightness value (0-255).
      example: 200
      selector:
        number:
          min: 0
          max: 255
          mode: slider
    advanced:
      name: Advanced settings
      collapsed: true
      fields:
        speed:
          name: Speed
          description: Speed value (0-255).
          example: 128
          selector:
            number:
              min: 0
              max: 255
              mode: slider
        direction:
          name: Direction
          description: Direction to run the effect.
          example: Center
          selector:
            select:
              options:
                - Left
                - Center
                - Right
        color_1:
          name: Color 1
          description: First color.
          example: "[255, 0, 0]"
          selector:
            color_rgb:
        color_2:
          name: Color 2
          description: Second color.
          example: "[0, 255, 0]"
          selector:
            color_rgb:
        color_3:
          name: Color 3
          description: Third color.
          example: "[0, 0, 255]"
          selector:
            color_rgb:
        color_4:
          name: Color 4
          description: Fourth color.
          selector:
            color_rgb:
        color_5:
          name: Color 5
          description: Fifth color.
          selector:
            color_rgb:
        color_6:
          name: Color 6
          description: Sixth color.
          selector:
            color_rgb:

sync_state:
  name: Request settings
  description: Request the light to send its current settings.
  target:
    entity:
      domain: light
      integration: ble_lights
  fields:
    timeout:
      name: Timeout
      description: Timeout in seconds to wait for the response.
      required: false
      default: 6

apply_scene:
  name: Apply scene
  description: >-
    Apply the user-visible aspects of a 40-byte requestSettings response
    back to the light: all 6 colors, program/effect, direction, speed,
    brightness, and on/off state. Timer schedules, sync mode, and firmware
    version are not applied.
  target:
    entity:
      domain: light
      integration: ble_lights
  fields:
    settings:
      name: Settings String
      description: >-
        The 40-byte device settings packet as a hex string (80 characters).
      required: true
      example: "300a1400ff..."
      selector:
        text:
